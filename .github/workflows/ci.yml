# .github/workflows/ci.yml — copied into a generated CLI by cliwright (GOAL.md §6).
# Key trap: build the linters/scanners (golangci-lint, gosec, govulncheck) FROM SOURCE with
# this job's Go via `go install ...@latest` — do NOT pin them and do NOT lean on the prebuilt
# golangci-lint-action / gosec ACTION. The prebuilt binaries lag the Go toolchain (they target
# an older Go and can't analyze a module that already moved to the next Go release, e.g. a
# go1.25 module under a Go-1.24 scanner → "configuration contains invalid elements" /
# "invalid array length -delta*delta"). Compiling @latest here always matches the module's Go.
name: CI
on:
  push: { branches: [main, develop] }
  pull_request:

permissions: { contents: read }

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go vet ./...
      - name: golangci-lint
        # Built from source with this job's Go (not golangci-lint-action) so the linter's Go
        # toolchain always matches the module — the prebuilt action lags and rejects a module
        # on a newer Go ("configuration contains invalid elements"). Also avoids the action's
        # incompatible config-verify wrapper.
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run ./...
      - name: docs-gen drift check
        run: make docs-gen && git diff --exit-code -- docs/commands

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - name: govulncheck (blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec (high-severity gate)
        # Built from source with this job's Go for the same reason as golangci-lint above:
        # the pinned prebuilt action lags the toolchain and can't parse a module on a newer Go.
        # @latest compiled here always matches the module's Go. Standalone gosec honors
        # `#nosec Gxxx` (not golangci's `//nolint:gosec`); for a CLI suppress the known
        # false-positives (G404 non-crypto jitter RNG, G304/G703 user --out/input paths).
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity high -confidence medium ./...

  test:
    strategy:
      matrix: { os: [ubuntu-latest, macos-latest, windows-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: go test -race ./... -coverprofile=coverage.out
      - name: coverage gate (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/cover-check.sh 80
      - if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - uses: goreleaser/goreleaser-action@v6
        with: { args: check }
      - uses: goreleaser/goreleaser-action@v6
        with: { args: release --snapshot --clean --skip=sign,sbom,docker }
